<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ответ на вопрос</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent-color: #5865f2;
            --accent-hover: #4752c4;
            --text-main: #ffffff;
            --text-muted: #8a8f98;
            --border-color: #2b2e3a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Основной контейнер */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 500px;
        }

        .oracle-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        /* Инпуты и кнопка */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        input[type="text"] {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            background-color: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(88, 101, 242, 0.15);
        }

        button {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Секция с ответом */
        .answer-box {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .answer-label {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .answer-text {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(45deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Анимация появления */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Подвал сайта (Футер) */
        footer {
            width: 100%;
            max-width: 1200px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        .footer-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        footer a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        footer a:hover {
            color: var(--accent-color);
        }

        .copyright {
            font-size: 13px;
            opacity: 0.7;
        }

        @media (max-width: 480px) {
            .oracle-card {
                padding: 30px 20px;
            }
            .answer-text {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <!-- Основной контент страницы -->
    <main class="main-container">
        <div class="oracle-card">
            <h2>Задайте свой вопрос</h2>
            
            <div class="input-group">
                <input type="text" id="questionInput" placeholder="Стоит ли мне делать это..." autocomplete="off">
                <button onclick="getAnswer()">Получить ответ</button>
            </div>

            <!-- Скрытый блок, который будет красиво появляться -->
            <div class="answer-box" id="answerBox">
                <div class="answer-label">Вердикт оракула</div>
                <div class="answer-text" id="answerText">ДА</div>
            </div>
        </div>
    </main>

    <!-- Футер -->
    <footer>
        <div class="footer-links">
            <span><strong>Ответ на вопрос</strong></span>
            <a href="https://nuller.ru" target="_blank">Сайт разработчиков</a>
            <a href="mailto:nullercompany@gmail.com">nullercompany@gmail.com</a>
        </div>
        <div class="copyright">
            © 2026 NULLER Company. Все права защищены.
        </div>
    </footer>

    <!-- Логика генерации случайного ответа -->
    <script>
        const answers = ["ДА", "НЕТ", "НЕИЗВЕСТНО", "ВОЗМОЖНО", "СКОРЕЕ НЕТ"];

        function getAnswer() {
            const input = document.getElementById('questionInput');
            const answerBox = document.getElementById('answerBox');
            const answerText = document.getElementById('answerText');

            // Проверка на пустой ввод
            if (input.value.trim() === "") {
                alert("Пожалуйста, введите ваш вопрос!");
                return;
            }

            // Перезапуск анимации появления при каждом клике
            answerBox.style.display = 'none';
            void answerBox.offsetWidth; // Хак для сброса анимации
            
            // Выбор рандомного слова
            const randomIndex = Math.floor(Math.random() * answers.length);
            answerText.textContent = answers[randomIndex];
            
            // Отображение ответа
            answerBox.style.display = 'block';
        }

        // Позволяет отправлять вопрос по нажатию на клавишу Enter
        document.getElementById('questionInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                getAnswer();
            }
        });

        // ==========================================
        // СИСТЕМА ЗАЩИТЫ ИСХОДНОГО КОДА NULLER COMPANY
        // ==========================================
        
        // 1. Блокировка контекстного меню (Правая кнопка мыши)
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        // 2. Блокировка выделения текста и картинок (Защита от копирования)
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
            return false;
        });
        
        // 3. Блокировка перетаскивания элементов страницы
        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
            return false;
        });
        
        // 4. Блокировка горячих клавиш инспектирования кода
        document.addEventListener('keydown', function(e) {
            // Блокируем клавишу F12
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            
            // Блокируем Ctrl+U (Просмотр исходного кода)
            if (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.keyCode === 85)) {
                e.preventDefault();
                return false;
            }
            
            // Блокируем Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C (Панель разработчика)
            if (e.ctrlKey && e.shiftKey && (
                e.key === 'I' || e.key === 'i' || e.keyCode === 73 ||
                e.key === 'J' || e.key === 'j' || e.keyCode === 74 ||
                e.key === 'C' || e.key === 'c' || e.keyCode === 67
            )) {
                e.preventDefault();
                return false;
            }
            
            // Блокируем Ctrl+S (Сохранение страницы на диск)
            if (e.ctrlKey && (e.key === 's' || e.key === 'S' || e.keyCode === 83)) {
                e.preventDefault();
                return false;
            }
            
            // Блокируем Ctrl+H (Просмотр истории/исходников в некоторых браузерах)
            if (e.ctrlKey && (e.key === 'h' || e.key === 'H' || e.keyCode === 72)) {
                e.preventDefault();
                return false;
            }
        });
        
        // 5. Продвинутая защита: Анти-отладчик (Зацикливание консоли)
        // Если продвинутый пользователь всё же откроет консоль через меню браузера, 
        // этот скрипт начнет бесконечно спамить отладку, замораживая вкладку DevTools.
        setInterval(function() {
            (function() {
                return false;
            }['constructor']('debugger')());
        }, 50);
    </script>

</body>
</html>
